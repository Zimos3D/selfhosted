name: Build and Push n8n-ffmpeg
on:
  push:
    branches: [ main ]
    paths:
      - 'services/n8n-ffmpeg/Dockerfile' # Only runs if you change the Dockerfile
      - 'docker-compose-portainer.yml' # Or whenever you tweak the stack
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # This creates an image named: ghcr.io/zimos3d/n8n-custom:latest
          tags: ghcr.io/zimos3d/n8n-custom:latest

      - name: Trigger Portainer Webhook
        run: |
          curl -X POST "${{ secrets.PORTAINER_WEBHOOK_URL }}"